name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, users, pets, bookings]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/services/${{ matrix.service }}/requirements.txt pytest

      - name: Run tests
        env:
          SUPABASE_URL: http://mock.supabase.co
          SUPABASE_ANON_KEY: mock-anon-key
          SUPABASE_SERVICE_ROLE_KEY: mock-service-role-key
          JWT_SECRET: mock-jwt-secret
          SMTP_HOST: localhost
          SMTP_PORT: '587'
          SMTP_USER: test@example.com
          SMTP_PASS: password
          EMAIL_FROM: noreply@carepets.com
        run: |
          cd backend/services/${{ matrix.service }}
          pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm test -- --passWithNoTests --watchAll=false

      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp backend/.env.example backend/.env

      - name: Build all Docker images
        run: docker compose -f backend/docker-compose.yaml build
