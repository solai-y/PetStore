name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, users, pets, bookings]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/services/${{ matrix.service }}/requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        env:
          SUPABASE_URL: http://mock.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7W9oLGAkPOqNvv_G3f6O4gTcATpKLnOY1I4
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc0
          JWT_SECRET: mock-jwt-secret
          SMTP_HOST: smtp.example.com
          SMTP_PORT: "587"
          SMTP_USER: noreply@example.com
          SMTP_PASS: mock-smtp-password
          EMAIL_FROM: CarePets <noreply@example.com>
        run: |
          cd backend/services/${{ matrix.service }}
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: backend/services/${{ matrix.service }}/coverage.xml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm test -- --passWithNoTests --watchAll=false

      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp backend/.env.example backend/.env

      - name: Build all Docker images
        run: docker compose -f backend/docker-compose.yaml build

  smoke-test:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Create mock .env for smoke test
        run: |
          cat > backend/.env << 'EOF'
          SUPABASE_URL=http://mock.supabase.co
          SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7W9oLGAkPOqNvv_G3f6O4gTcATpKLnOY1I4
          SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc0
          JWT_SECRET=mock-jwt-secret
          SMTP_HOST=smtp.example.com
          SMTP_PORT=587
          SMTP_USER=noreply@example.com
          SMTP_PASS=mock-smtp-password
          EMAIL_FROM=CarePets <noreply@example.com>
          EOF

      - name: Start stack
        run: docker compose -f backend/docker-compose.yaml up -d

      - name: Wait for all services to be ready
        run: |
          for i in $(seq 1 45); do
            auth=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/auth/me || echo "000")
            users=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/users/smoke-test || echo "000")
            pets=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/pets || echo "000")
            bookings=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/bookings || echo "000")
            echo "Attempt $i: auth=$auth users=$users pets=$pets bookings=$bookings"
            if [ "$auth" = "401" ] && [ "$users" = "401" ] && [ "$pets" = "401" ] && [ "$bookings" = "401" ]; then
              echo "All services ready"
              exit 0
            fi
            sleep 2
          done
          echo "Services did not become ready – dumping logs"
          docker compose -f backend/docker-compose.yaml logs
          exit 1

      - name: Smoke test – auth service
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/auth/me || echo "000")
          [ "$status" = "401" ] || (echo "Auth: expected 401, got $status" && exit 1)

      - name: Smoke test – users service
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/users/smoke-test || echo "000")
          [ "$status" = "401" ] || (echo "Users: expected 401, got $status" && exit 1)

      - name: Smoke test – pets service
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/pets || echo "000")
          [ "$status" = "401" ] || (echo "Pets: expected 401, got $status" && exit 1)

      - name: Smoke test – bookings service
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/bookings || echo "000")
          [ "$status" = "401" ] || (echo "Bookings: expected 401, got $status" && exit 1)

      - name: Tear down
        if: always()
        run: docker compose -f backend/docker-compose.yaml down
